apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-db
  namespace: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root123"
            - name: MYSQL_DATABASE
              value: "taskmanager"
          ports:
            - containerPort: 3306

