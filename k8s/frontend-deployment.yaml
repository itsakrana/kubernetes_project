apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-frontend
  namespace: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: akrana2006/frontend-image:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
